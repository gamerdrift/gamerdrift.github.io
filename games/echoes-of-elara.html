<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Echoes of Elara // Tactical Grid Simulator</title>
  <style>
    :root {
      --green: #00ff88;
      --bg: #030705;
      --panel: #06140d;
      --border: #0a2f1b;
      --text: #a8ffd0;
      --gold: #ffd700;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: monospace;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      user-select: none;
      overflow: hidden;
    }
    .hud {
      width: 600px;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 10px 15px;
      display: flex;
      justify-content: space-between;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
    }
    .hud-stat {
      font-size: 0.85rem;
    }
    .hud-stat span {
      color: var(--green);
      font-weight: bold;
    }
    #game-container {
      position: relative;
    }
    canvas {
      background: #020704;
      border: 2px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }
    .log-panel {
      width: 600px;
      height: 90px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 10px;
      padding: 8px 15px;
      box-sizing: border-box;
      overflow-y: auto;
      font-size: 0.75rem;
      line-height: 1.4;
      color: #7acc9c;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      background: rgba(0, 255, 136, 0.08);
      border: 1px solid var(--green);
      color: var(--green);
      font-family: monospace;
      font-size: 0.8rem;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.25s;
    }
    button:hover:not(:disabled) {
      background: var(--green);
      color: #000;
      box-shadow: 0 0 10px var(--green);
    }
    button:disabled {
      border-color: #334e3f;
      color: #334e3f;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div style="font-family: monospace; font-size: 0.65rem; color: var(--green); letter-spacing: 0.2em; margin-bottom: 5px;">ECHOES OF ELARA // LORE SIMULATOR v1.04</div>
  
  <div class="hud">
    <div class="hud-stat">HP: <span id="hp-val">30/30</span></div>
    <div class="hud-stat">MANA: <span id="mp-val">15/15</span></div>
    <div class="hud-stat">AP: <span id="ap-val">3/3</span></div>
    <div class="hud-stat">WAVE: <span id="wave-val">1</span></div>
    <div class="hud-stat">SCORE: <span id="score-val" style="color: var(--gold);">0</span></div>
  </div>

  <div id="game-container">
    <canvas id="canvas" width="600" height="400"></canvas>
  </div>

  <div class="controls">
    <button id="btn-fireball" onclick="selectAction('fireball')">FIREBALL (1 AP, 3 MP)</button>
    <button id="btn-shield" onclick="selectAction('shield')">SHIELD (1 AP, 5 MP)</button>
    <button id="btn-rest" onclick="selectRest()">REST (End Turn)</button>
  </div>

  <div class="log-panel" id="log-panel">
    <div>[ELARA HUD] Tactical simulation initialized. Eliminate invading forces.</div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const GRID_SIZE = 5;
    const CELL_W = 80;
    const CELL_H = 80;
    const GRID_OFFSET_X = 100;
    const GRID_OFFSET_Y = 0;

    let player = {
      x: 2,
      y: 4,
      maxHp: 30,
      hp: 30,
      maxMp: 15,
      mp: 15,
      maxAp: 3,
      ap: 3,
      shield: 0
    };

    let enemies = [];
    let particles = [];
    let wave = 1;
    let score = 0;
    let selectedSpell = null;
    let isPlayerTurn = true;

    class Enemy {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type;
        if (type === 'grunt') {
          this.hp = 8;
          this.maxHp = 8;
          this.color = '#ff4455';
          this.name = 'Wraith';
          this.damage = 4;
        } else {
          this.hp = 18;
          this.maxHp = 18;
          this.color = '#bd00ff';
          this.name = 'Reaper';
          this.damage = 8;
        }
      }
    }

    function addLog(msg) {
      const panel = document.getElementById('log-panel');
      const item = document.createElement('div');
      item.textContent = `> ${msg}`;
      panel.appendChild(item);
      panel.scrollTop = panel.scrollHeight;
    }

    function spawnEnemies() {
      enemies = [];
      let count = Math.min(2 + Math.floor(wave / 2), 4);
      for(let i=0; i<count; i++) {
        let rx = Math.floor(Math.random() * GRID_SIZE);
        let ry = Math.floor(Math.random() * 2); // spawn in top 2 rows
        let type = (wave >= 3 && i === 0) ? 'reaper' : 'grunt';
        enemies.push(new Enemy(rx, ry, type));
      }
      addLog(`Wave ${wave} started. Invading anomalies detected.`);
    }

    function selectAction(action) {
      if (!isPlayerTurn) return;
      if (action === 'fireball') {
        if (player.mp < 3) {
          addLog("Insufficient Mana for Fireball!");
          return;
        }
        selectedSpell = 'fireball';
        addLog("Select an adjacent or diagonal cell grid to discharge Fireball.");
      } else if (action === 'shield') {
        if (player.mp < 5) {
          addLog("Insufficient Mana for Shield!");
          return;
        }
        if (player.ap < 1) {
          addLog("Insufficient Action Points!");
          return;
        }
        player.mp -= 5;
        player.ap -= 1;
        player.shield += 8;
        addLog(`Cast Shield core. Absorbs +8 damage.`);
        createShieldEffect(player.x, player.y);
        updateHUD();
      }
    }

    function selectRest() {
      if (!isPlayerTurn) return;
      isPlayerTurn = false;
      addLog("Ending turn. Initializing hostile combat cycle...");
      enemyTurn();
    }

    function handleGridClick(gridX, gridY) {
      if (!isPlayerTurn) return;
      
      // If a spell is selected
      if (selectedSpell === 'fireball') {
        let dist = Math.max(Math.abs(gridX - player.x), Math.abs(gridY - player.y));
        if (dist <= 2) { // 2-cell range
          player.ap -= 1;
          player.mp -= 3;
          selectedSpell = null;
          
          createFireballEffect(player.x, player.y, gridX, gridY);
          
          let hitEnemy = enemies.find(e => e.x === gridX && e.y === gridY);
          if (hitEnemy) {
            let dmg = 6;
            hitEnemy.hp -= dmg;
            addLog(`Fireball hit ${hitEnemy.name} for ${dmg} thermal damage!`);
            if (hitEnemy.hp <= 0) {
              addLog(`${hitEnemy.name} terminated. Core recovered.`);
              score += hitEnemy.type === 'grunt' ? 100 : 250;
              enemies = enemies.filter(e => e !== hitEnemy);
            }
          } else {
            addLog("Fireball discharged into empty space.");
          }
          
          updateHUD();
          if (player.ap <= 0) {
            selectRest();
          }
        } else {
          addLog("Target cell out of range (max 2 cells).");
        }
        return;
      }

      // Default: Movement
      let dist = Math.abs(gridX - player.x) + Math.abs(gridY - player.y);
      if (dist === 1) {
        if (player.ap >= 1) {
          // Check if spot is occupied
          if (enemies.some(e => e.x === gridX && e.y === gridY)) {
            addLog("Target grid is occupied by enemy anomaly!");
            return;
          }
          player.x = gridX;
          player.y = gridY;
          player.ap -= 1;
          addLog(`Elara relocated to grid [${gridX}, ${gridY}].`);
          updateHUD();
          if (player.ap <= 0) {
            selectRest();
          }
        } else {
          addLog("Insufficient Action Points for relocation!");
        }
      }
    }

    function enemyTurn() {
      setTimeout(() => {
        if (enemies.length === 0) {
          wave++;
          spawnEnemies();
          endEnemyTurn();
          return;
        }

        enemies.forEach(e => {
          let dist = Math.abs(e.x - player.x) + Math.abs(e.y - player.y);
          if (dist === 1) {
            // Attack player
            let dmg = e.damage;
            if (player.shield > 0) {
              let absorbed = Math.min(player.shield, dmg);
              player.shield -= absorbed;
              dmg -= absorbed;
              addLog(`${e.name} attacks! Shield absorbs ${absorbed} damage.`);
            }
            if (dmg > 0) {
              player.hp -= dmg;
              addLog(`${e.name} attacks for ${dmg} raw damage!`);
            }
          } else {
            // Move closer
            let dx = player.x - e.x;
            let dy = player.y - e.y;
            if (Math.abs(dx) > Math.abs(dy)) {
              e.x += Math.sign(dx);
            } else {
              e.y += Math.sign(dy);
            }
            addLog(`${e.name} advances towards coordinates.`);
          }
        });

        if (player.hp <= 0) {
          addLog("ELARA CORE TERMINATED. SIMULATION FAILED.");
          player.hp = 0;
          updateHUD();
          return;
        }

        endEnemyTurn();
      }, 1000);
    }

    function endEnemyTurn() {
      player.ap = player.maxAp;
      player.mp = Math.min(player.maxMp, player.mp + 4); // regen mana
      isPlayerTurn = true;
      addLog("AP/Mana recalibrated. Initiating tactical turn cycle.");
      updateHUD();
    }

    function updateHUD() {
      document.getElementById('hp-val').textContent = `${player.hp}/${player.maxHp} (Shield: ${player.shield})`;
      document.getElementById('mp-val').textContent = `${player.mp}/${player.maxMp}`;
      document.getElementById('ap-val').textContent = `${player.ap}/${player.maxAp}`;
      document.getElementById('wave-val').textContent = wave;
      document.getElementById('score-val').textContent = score;
    }

    // Interactive Clicking
    canvas.addEventListener('click', (e) => {
      let rect = canvas.getBoundingClientRect();
      let clickX = e.clientX - rect.left - GRID_OFFSET_X;
      let clickY = e.clientY - rect.top - GRID_OFFSET_Y;
      
      let gridX = Math.floor(clickX / CELL_W);
      let gridY = Math.floor(clickY / CELL_H);
      
      if (gridX >= 0 && gridX < GRID_SIZE && gridY >= 0 && gridY < GRID_SIZE) {
        handleGridClick(gridX, gridY);
      }
    });

    // Particle Visual Engine
    function createFireballEffect(sx, sy, tx, ty) {
      particles.push({
        x: sx * CELL_W + CELL_W/2 + GRID_OFFSET_X,
        y: sy * CELL_H + CELL_H/2 + GRID_OFFSET_Y,
        tx: tx * CELL_W + CELL_W/2 + GRID_OFFSET_X,
        ty: ty * CELL_H + CELL_H/2 + GRID_OFFSET_Y,
        progress: 0,
        type: 'fireball'
      });
    }

    function createShieldEffect(gx, gy) {
      particles.push({
        x: gx * CELL_W + CELL_W/2 + GRID_OFFSET_X,
        y: gy * CELL_H + CELL_H/2 + GRID_OFFSET_Y,
        life: 30,
        type: 'shield'
      });
    }

    function drawGrid() {
      ctx.strokeStyle = '#051b0f';
      ctx.lineWidth = 1;
      for (let i = 0; i <= GRID_SIZE; i++) {
        ctx.beginPath();
        ctx.moveTo(GRID_OFFSET_X + i * CELL_W, GRID_OFFSET_Y);
        ctx.lineTo(GRID_OFFSET_X + i * CELL_W, GRID_OFFSET_Y + GRID_SIZE * CELL_H);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(GRID_OFFSET_X, GRID_OFFSET_Y + i * CELL_H);
        ctx.lineTo(GRID_OFFSET_X + GRID_SIZE * CELL_W, GRID_OFFSET_Y + i * CELL_H);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Draw grid coordinates
      drawGrid();

      // Render player
      ctx.fillStyle = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(player.x * CELL_W + CELL_W/2 + GRID_OFFSET_X, player.y * CELL_H + CELL_H/2 + GRID_OFFSET_Y, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Draw Player E Label
      ctx.fillStyle = '#000000';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('ELARA', player.x * CELL_W + CELL_W/2 + GRID_OFFSET_X, player.y * CELL_H + CELL_H/2 + GRID_OFFSET_Y);

      // Render enemies
      enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 10;
        ctx.fillRect(e.x * CELL_W + 15 + GRID_OFFSET_X, e.y * CELL_H + 15 + GRID_OFFSET_Y, CELL_W - 30, CELL_H - 30);
        ctx.shadowBlur = 0;

        // Enemy Label & HP
        ctx.fillStyle = '#ffffff';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(e.name, e.x * CELL_W + CELL_W/2 + GRID_OFFSET_X, e.y * CELL_H + 30 + GRID_OFFSET_Y);
        ctx.fillStyle = '#ff4455';
        ctx.fillText(`HP: ${e.hp}`, e.x * CELL_W + CELL_W/2 + GRID_OFFSET_X, e.y * CELL_H + 50 + GRID_OFFSET_Y);
      });

      // Particle update & render
      particles.forEach((p, idx) => {
        if (p.type === 'fireball') {
          p.progress += 0.05;
          let px = p.x + (p.tx - p.x) * p.progress;
          let py = p.y + (p.ty - p.y) * p.progress;
          ctx.fillStyle = '#ffd700';
          ctx.beginPath();
          ctx.arc(px, py, 12, 0, Math.PI * 2);
          ctx.fill();
          if (p.progress >= 1) particles.splice(idx, 1);
        } else if (p.type === 'shield') {
          p.life--;
          ctx.strokeStyle = '#00ff88';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 25 + (30 - p.life) * 0.5, 0, Math.PI * 2);
          ctx.stroke();
          if (p.life <= 0) particles.splice(idx, 1);
        }
      });
    }

    function loop() {
      draw();
      requestAnimationFrame(loop);
    }

    spawnEnemies();
    updateHUD();
    loop();
  </script>
</body>
</html>
