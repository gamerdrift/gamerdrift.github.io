<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neon Snake</title>
  <style>
    body {
      background: #030305;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      color: #00ffea;
    }
    #hud {
      display: flex;
      justify-content: space-between;
      width: 400px;
      margin-bottom: 10px;
      font-size: 1.2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 8px rgba(0, 255, 234, 0.6);
    }
    canvas {
      border: 2px solid #00ffea;
      box-shadow: 0 0 25px rgba(0, 255, 234, 0.4), inset 0 0 15px rgba(0, 255, 234, 0.1);
      background: #08080f;
    }
    #gameover-overlay {
      display: none;
      position: absolute;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(3, 3, 5, 0.85);
      border: 1px solid #ff0055;
      box-shadow: 0 0 30px rgba(255, 0, 87, 0.3);
      width: 320px;
      height: 180px;
      text-align: center;
    }
    #gameover-overlay h2 {
      color: #ff0055;
      margin: 0 0 10px 0;
      text-shadow: 0 0 10px rgba(255, 0, 85, 0.6);
    }
    #btn-restart {
      background: transparent;
      border: 1px solid #00ffea;
      color: #00ffea;
      padding: 8px 16px;
      font-family: inherit;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 15px;
      box-shadow: 0 0 10px rgba(0, 255, 234, 0.2);
    }
    #btn-restart:hover {
      background: #00ffea;
      color: #030305;
      box-shadow: 0 0 15px #00ffea;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>SCORE: <span id="score-val">00</span></div>
    <div>HIGH: <span id="high-val">00</span></div>
  </div>
  <div style="position: relative;">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="gameover-overlay">
      <h2>SYSTEM TERMINATED</h2>
      <div>SCORE DETECTED: <span id="final-score">00</span></div>
      <button id="btn-restart">REBOOT SIMULATION</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const highVal = document.getElementById('high-val');
    const finalScore = document.getElementById('final-score');
    const overlay = document.getElementById('gameover-overlay');
    const restartBtn = document.getElementById('btn-restart');

    const grid = 20;
    let snake = [{ x: 160, y: 160 }, { x: 140, y: 160 }, { x: 120, y: 160 }];
    let dx = grid;
    let dy = 0;
    let food = { x: 0, y: 0 };
    let score = 0;
    let highScore = parseInt(localStorage.getItem('gd-snake-high') || '0');
    highVal.textContent = highScore < 10 ? '0' + highScore : highScore;
    let gameInterval = null;
    let isGameOver = false;

    function spawnFood() {
      food.x = Math.floor(Math.random() * (canvas.width / grid)) * grid;
      food.y = Math.floor(Math.random() * (canvas.height / grid)) * grid;
      // Make sure food is not on snake
      for (let cell of snake) {
        if (cell.x === food.x && cell.y === food.y) {
          spawnFood();
          break;
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid background effect
      ctx.strokeStyle = 'rgba(0, 255, 234, 0.03)';
      ctx.lineWidth = 1;
      for (let i = 0; i < canvas.width; i += grid) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
      }

      // Draw Food
      ctx.fillStyle = '#ff0055';
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#ff0055';
      ctx.beginPath();
      ctx.arc(food.x + grid/2, food.y + grid/2, grid/2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // Draw Snake
      snake.forEach((cell, idx) => {
        if (idx === 0) {
          ctx.fillStyle = '#00ffea';
          ctx.shadowColor = '#00ffea';
        } else {
          ctx.fillStyle = '#00aa9a';
          ctx.shadowColor = '#00aa9a';
        }
        ctx.shadowBlur = idx === 0 ? 12 : 6;
        ctx.fillRect(cell.x + 1, cell.y + 1, grid - 2, grid - 2);
      });
      
      // Reset shadow
      ctx.shadowBlur = 0;
    }

    function update() {
      if (isGameOver) return;

      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // Wall collision
      if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
        endGame();
        return;
      }

      // Self collision
      for (let cell of snake) {
        if (head.x === cell.x && head.y === cell.y) {
          endGame();
          return;
        }
      }

      snake.unshift(head);

      // Food collision
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreVal.textContent = score < 10 ? '0' + score : score;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('gd-snake-high', highScore);
          highVal.textContent = highScore < 10 ? '0' + highScore : highScore;
        }
        
        // Notify parent Next.js application of achievement
        if (score >= 100) {
          window.parent.postMessage({ type: 'ACHIEVEMENT_UNLOCK', game: 'neonsnake', achievement: 'SNAKE_MASTER' }, '*');
        }

        spawnFood();
      } else {
        snake.pop();
      }
    }

    function loop() {
      update();
      draw();
    }

    function handleKeydown(e) {
      if (isGameOver) return;
      const key = e.key.toLowerCase();
      
      if ((key === 'arrowleft' || key === 'a') && dx === 0) {
        dx = -grid;
        dy = 0;
      } else if ((key === 'arrowup' || key === 'w') && dy === 0) {
        dx = 0;
        dy = -grid;
      } else if ((key === 'arrowright' || key === 'd') && dx === 0) {
        dx = grid;
        dy = 0;
      } else if ((key === 'arrowdown' || key === 's') && dy === 0) {
        dx = 0;
        dy = grid;
      }
    }

    function endGame() {
      isGameOver = true;
      clearInterval(gameInterval);
      finalScore.textContent = score;
      overlay.style.display = 'flex';
      overlay.style.top = '110px';
      overlay.style.left = '40px';
    }

    function startGame() {
      isGameOver = false;
      score = 0;
      scoreVal.textContent = '00';
      snake = [{ x: 160, y: 160 }, { x: 140, y: 160 }, { x: 120, y: 160 }];
      dx = grid;
      dy = 0;
      overlay.style.display = 'none';
      spawnFood();
      clearInterval(gameInterval);
      gameInterval = setInterval(loop, 100);
    }

    window.addEventListener('keydown', handleKeydown);
    restartBtn.addEventListener('click', startGame);

    startGame();
  </script>
</body>
</html>
