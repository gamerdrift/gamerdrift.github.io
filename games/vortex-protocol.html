<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vortex Protocol Arcade</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #020205;
      color: #ff0055;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #game-container {
      position: relative;
      width: 600px;
      height: 400px;
      border: 2px solid #ff0055;
      box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
    }
    canvas {
      display: block;
      background: #050308;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(2, 1, 4, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .btn {
      background: #ff0055;
      color: #fff;
      border: none;
      padding: 12px 28px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      box-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
      transition: all 0.2s;
    }
    .btn:hover {
      box-shadow: 0 0 20px rgba(255, 0, 85, 0.9);
      transform: scale(1.05);
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      font-size: 0.85rem;
      text-shadow: 0 0 5px #ff0055;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div>EXPLOITS: <span id="score-val">0000</span></div>
      <div>CORE TEMPERATURE: <span id="shield-val">0%</span></div>
    </div>
    <div id="overlay">
      <h2 style="margin: 0; font-size: 1.8rem; text-shadow: 0 0 10px #ff0055; text-transform: uppercase;">VORTEX PROTOCOL</h2>
      <p style="color: #a5a5b5; font-size: 0.75rem; text-align: center; margin: 10px 20px 0; line-height: 1.4;">
        Use LEFT/RIGHT arrows or A/D to fly.<br/>Press SPACE or CLICK to fire plasma lasers.<br/>Clear the rogue data shards.
      </p>
      <button class="btn" id="start-btn">BOOT EXPLOIT AGENT</button>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const scoreVal = document.getElementById('score-val');
    const shieldVal = document.getElementById('shield-val');

    let gameActive = false;
    let score = 0;
    let heat = 0; // Out of 100
    let player = { x: 300, y: 350, w: 20, h: 20 };
    let lasers = [];
    let enemies = [];
    let particles = [];
    let keys = {};
    let lastShot = 0;

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    canvas.addEventListener('click', () => fireLaser());

    startBtn.addEventListener('click', () => {
      gameActive = true;
      score = 0;
      heat = 0;
      player.x = 300;
      lasers = [];
      enemies = [];
      particles = [];
      overlay.style.display = 'none';
      loop();
    });

    function fireLaser() {
      if (!gameActive) return;
      const now = Date.now();
      if (now - lastShot > 250) { // Limit fire rate
        lasers.push({ x: player.x, y: player.y - 12 });
        lastShot = now;
        // Small recoil sparks
        for (let i = 0; i < 3; i++) {
          particles.push({
            x: player.x,
            y: player.y - 12,
            vx: (Math.random() - 0.5) * 2,
            vy: -Math.random() * 2,
            life: 15,
            color: '#00f5ff'
          });
        }
      }
    }

    function spawnEnemy() {
      if (enemies.length < 8 && Math.random() < 0.04) {
        enemies.push({
          x: Math.random() * (canvas.width - 40) + 20,
          y: -20,
          speed: 1.5 + Math.random() * 2,
          radius: 10 + Math.random() * 15,
          color: '#ff0055'
        });
      }
    }

    function createExplosion(x, y, color, size = 15) {
      for (let i = 0; i < size; i++) {
        particles.push({
          x: x,
          y: y,
          vx: (Math.random() - 0.5) * 5,
          vy: (Math.random() - 0.5) * 5,
          life: 25 + Math.random() * 10,
          color: color
        });
      }
    }

    function update() {
      // Movement
      if (keys['ArrowLeft'] || keys['KeyA']) player.x -= 5;
      if (keys['ArrowRight'] || keys['KeyD']) player.x += 5;
      if (keys['Space']) fireLaser();

      player.x = Math.max(player.w, Math.min(canvas.width - player.w, player.x));

      // Lasers logic
      lasers.forEach((l, idx) => {
        l.y -= 7;
        if (l.y < 0) lasers.splice(idx, 1);
      });

      // Enemies logic
      spawnEnemy();
      enemies.forEach((e, eIdx) => {
        e.y += e.speed;
        
        // Check laser collision
        lasers.forEach((l, lIdx) => {
          const dx = l.x - e.x;
          const dy = l.y - e.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < e.radius + 3) {
            lasers.splice(lIdx, 1);
            createExplosion(e.x, e.y, '#ff0055', 18);
            enemies.splice(eIdx, 1);
            score += 15;
          }
        });

        // Check player collision
        const pdx = player.x - e.x;
        const pdy = player.y - e.y;
        const pDist = Math.sqrt(pdx * pdx + pdy * pdy);
        if (pDist < e.radius + player.w * 0.8) {
          enemies.splice(eIdx, 1);
          createExplosion(e.x, e.y, '#ffea00', 25);
          heat += 25;
          if (heat >= 100) {
            endGame();
          }
        }

        // Screen boundary
        if (e.y > canvas.height + e.radius) {
          enemies.splice(eIdx, 1);
          heat += 10; // penalty for leaking enemies
          if (heat >= 100) {
            endGame();
          }
        }
      });

      // Particles
      particles.forEach((p, idx) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(idx, 1);
      });

      // HUD updates
      scoreVal.innerText = String(score).padStart(4, '0');
      shieldVal.innerText = heat + '%';
      if (heat > 70) shieldVal.style.color = '#ff0055';
      else if (heat > 40) shieldVal.style.color = '#ffaa00';
      else shieldVal.style.color = '#00ff66';
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Starfield background
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      for (let i = 0; i < 40; i++) {
        let starX = (Math.sin(i * 987) * 0.5 + 0.5) * canvas.width;
        let starY = ((Math.cos(i * 321) * 0.5 + 0.5) * canvas.height + (Date.now() * 0.05 * (i % 3 + 1))) % canvas.height;
        ctx.fillRect(starX, starY, 1, 1);
      }

      // Draw Lasers
      ctx.fillStyle = '#00f5ff';
      lasers.forEach(l => {
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#00f5ff';
        ctx.fillRect(l.x - 1.5, l.y - 8, 3, 10);
        ctx.shadowBlur = 0;
      });

      // Draw Enemies
      enemies.forEach(e => {
        ctx.strokeStyle = e.color;
        ctx.fillStyle = 'rgba(255, 0, 85, 0.08)';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10;
        ctx.shadowColor = e.color;
        
        ctx.beginPath();
        // Draw polygonal "shards"
        const vertices = 6;
        for (let i = 0; i < vertices; i++) {
          const angle = (i / vertices) * Math.PI * 2;
          // slightly deform based on index
          const r = e.radius * (0.85 + Math.sin(i * 1.5) * 0.15);
          const vx = e.x + Math.cos(angle) * r;
          const vy = e.y + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(vx, vy);
          else ctx.lineTo(vx, vy);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        
        ctx.shadowBlur = 0;
      });

      // Draw Player
      ctx.save();
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#ff0055';
      ctx.fillStyle = '#ff0055';
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      
      ctx.beginPath();
      ctx.moveTo(player.x, player.y - 12);
      ctx.lineTo(player.x - 15, player.y + 8);
      ctx.lineTo(player.x - 8, player.y + 3);
      ctx.lineTo(player.x + 8, player.y + 3);
      ctx.lineTo(player.x + 15, player.y + 8);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      // Draw particles
      particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 2, 2);
      });
    }

    function endGame() {
      gameActive = false;
      overlay.style.display = 'flex';
      overlay.querySelector('h2').innerText = 'EXPLOIT TERMINATED';
      overlay.querySelector('p').innerHTML = `Core heat critical. Systems emergency reset.<br/>SCORE LOGGED: <span style="color:#00f5ff; font-weight:bold;">${score}</span>`;
      startBtn.innerText = 'RE-INITIALIZE EXPLOIT';
    }

    function loop() {
      if (!gameActive) return;
      update();
      draw();
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
