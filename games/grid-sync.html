<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Sync Network Alignment</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #020205;
      color: #bd00ff;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    #game-container {
      position: relative;
      width: 600px;
      height: 400px;
      border: 2px solid #bd00ff;
      box-shadow: 0 0 20px rgba(189, 0, 255, 0.3);
    }
    canvas {
      display: block;
      background: #060309;
    }
    #overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(4, 2, 8, 0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .btn {
      background: #bd00ff;
      color: #fff;
      border: none;
      padding: 12px 28px;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      box-shadow: 0 0 10px rgba(189, 0, 255, 0.5);
      transition: all 0.2s;
    }
    .btn:hover {
      box-shadow: 0 0 20px rgba(189, 0, 255, 0.9);
      transform: scale(1.05);
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      font-size: 0.85rem;
      text-shadow: 0 0 5px #bd00ff;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div>SYNC FREQ: <span id="score-val">0000</span> HZ</div>
      <div>SYNC LOCK TIMER: <span id="time-val">45s</span></div>
    </div>
    <div id="overlay">
      <h2 style="margin: 0; font-size: 1.8rem; text-shadow: 0 0 10px #bd00ff; text-transform: uppercase;">GRID SYNC</h2>
      <p style="color: #a5a5b5; font-size: 0.75rem; text-align: center; margin: 10px 20px 0; line-height: 1.4;">
        Click cells on the grid to rotate them.<br/>Connect the node on the LEFT (Input) to the RIGHT (Output).<br/>Align the pathways before the sync timer expires.
      </p>
      <button class="btn" id="start-btn">INITIALIZE MATRIX</button>
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const scoreVal = document.getElementById('score-val');
    const timeVal = document.getElementById('time-val');

    let gameActive = false;
    let score = 0;
    let timeRemaining = 45;
    let lastTime = 0;

    const gridSize = 5;
    const cellSize = 60;
    const startX = 150;
    const startY = 50;

    // Grid states
    // Each cell has a type:
    // 0: Horizontal/Vertical straight line
    // 1: 90-degree corner
    // 2: T-junction
    // Each cell has a rotation: 0, 1, 2, 3 (multipled by 90 deg)
    let grid = [];

    // Connections offset mapping based on rotation
    // straight line (type 0): connects [left, right] on rotation 0/2, [up, down] on rotation 1/3
    // corner (type 1): connects [down, right] on rot 0, [down, left] on rot 1, [up, left] on rot 2, [up, right] on rot 3
    // T-junction (type 2): connects [left, up, right] on rot 0, [up, right, down] on rot 1, [right, down, left] on rot 2, [down, left, up] on rot 3

    function getDirections(type, rotation) {
      if (type === 0) { // Straight
        return (rotation % 2 === 0) ? ['L', 'R'] : ['U', 'D'];
      }
      if (type === 1) { // Corner
        if (rotation === 0) return ['D', 'R'];
        if (rotation === 1) return ['D', 'L'];
        if (rotation === 2) return ['U', 'L'];
        if (rotation === 3) return ['U', 'R'];
      }
      if (type === 2) { // T-Junction
        if (rotation === 0) return ['L', 'U', 'R'];
        if (rotation === 1) return ['U', 'R', 'D'];
        if (rotation === 2) return ['R', 'D', 'L'];
        if (rotation === 3) return ['D', 'L', 'U'];
      }
      return [];
    }

    function initGrid() {
      grid = [];
      for (let r = 0; r < gridSize; r++) {
        grid.push([]);
        for (let c = 0; c < gridSize; c++) {
          grid[r].push({
            type: Math.floor(Math.random() * 3),
            rotation: Math.floor(Math.random() * 4)
          });
        }
      }
    }

    startBtn.addEventListener('click', () => {
      gameActive = true;
      score = 0;
      timeRemaining = 45;
      initGrid();
      overlay.style.display = 'none';
      lastTime = Date.now();
      loop();
    });

    canvas.addEventListener('click', (e) => {
      if (!gameActive) return;
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;

      // Check click in grid cells
      const c = Math.floor((mouseX - startX) / cellSize);
      const r = Math.floor((mouseY - startY) / cellSize);

      if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
        grid[r][c].rotation = (grid[r][c].rotation + 1) % 4;
        checkNetworkSync();
      }
    });

    function getOpposite(dir) {
      if (dir === 'L') return 'R';
      if (dir === 'R') return 'L';
      if (dir === 'U') return 'D';
      if (dir === 'D') return 'U';
      return '';
    }

    let activePath = [];

    function checkNetworkSync() {
      // Find path from input (left of grid row 2) to output (right of grid row 2)
      // We will perform a Depth First Search (DFS) starting from (2, 0) if it connects to 'L'
      activePath = [];
      const visited = Array(gridSize).fill().map(() => Array(gridSize).fill(false));
      
      function dfs(r, c, enterDir) {
        if (r < 0 || r >= gridSize || c < 0 || c >= gridSize) return false;
        if (visited[r][c]) return false;

        const cell = grid[r][c];
        const dirs = getDirections(cell.type, cell.rotation);
        
        // The cell must connect to the direction we are entering from
        if (!dirs.includes(enterDir)) return false;

        visited[r][c] = true;
        activePath.push({r, c});

        // If we reached output node (row 2, col 4) and it has connection to 'R'
        if (r === 2 && c === 4 && dirs.includes('R')) {
          return true;
        }

        // Try moving to other connected directions
        for (let i = 0; i < dirs.length; i++) {
          const d = dirs[i];
          if (d === enterDir) continue; // Don't go back

          let nr = r, nc = c, nextEnter = '';
          if (d === 'L') { nc = c - 1; nextEnter = 'R'; }
          if (d === 'R') { nc = c + 1; nextEnter = 'L'; }
          if (d === 'U') { nr = r - 1; nextEnter = 'D'; }
          if (d === 'D') { nr = r + 1; nextEnter = 'U'; }

          if (dfs(nr, nc, nextEnter)) return true;
        }

        activePath.pop();
        return false;
      }

      // Input starts at row 2, col 0, entering from 'L'
      if (dfs(2, 0, 'L')) {
        // Sync complete!
        score += 100;
        timeRemaining = Math.min(60, timeRemaining + 10);
        scoreVal.innerText = score;
        
        // Show success animation brief delay, then load new puzzle
        setTimeout(() => {
          initGrid();
          activePath = [];
        }, 300);
      }
    }

    function update() {
      const now = Date.now();
      if (now - lastTime >= 1000) {
        timeRemaining--;
        lastTime = now;
        if (timeRemaining <= 0) {
          endGame();
        }
      }
      timeVal.innerText = timeRemaining + 's';
    }

    function drawCell(r, c, type, rotation, isActive) {
      const x = startX + c * cellSize;
      const y = startY + r * cellSize;

      ctx.strokeStyle = isActive ? '#00f5ff' : '#bd00ff';
      ctx.lineWidth = isActive ? 3 : 1.5;
      
      // Draw cell border grid
      ctx.strokeStyle = 'rgba(189, 0, 255, 0.15)';
      ctx.strokeRect(x, y, cellSize, cellSize);

      ctx.strokeStyle = isActive ? '#00f5ff' : '#bd00ff';
      if (isActive) {
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#00f5ff';
      }

      // Draw inside connections in rotated system
      ctx.save();
      ctx.translate(x + cellSize/2, y + cellSize/2);
      ctx.rotate((rotation * 90) * Math.PI / 180);

      const h = cellSize / 2;
      ctx.beginPath();

      if (type === 0) { // Straight
        ctx.moveTo(-h, 0);
        ctx.lineTo(h, 0);
      } else if (type === 1) { // Corner
        ctx.arc(-h, h, h, -Math.PI / 2, 0);
      } else if (type === 2) { // T-Junction
        ctx.moveTo(-h, 0);
        ctx.lineTo(h, 0);
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -h);
      }

      ctx.stroke();
      ctx.restore();
      ctx.shadowBlur = 0;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw background decorations
      ctx.strokeStyle = 'rgba(189, 0, 255, 0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i < canvas.width; i += 20) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();
      }

      // Draw Input and Output terminals
      ctx.fillStyle = '#00f5ff';
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#00f5ff';
      // Left terminal
      ctx.fillRect(startX - 25, startY + 2 * cellSize + 20, 20, 20);
      ctx.fillStyle = '#bd00ff';
      ctx.shadowColor = '#bd00ff';
      // Right terminal
      ctx.fillRect(startX + gridSize * cellSize + 5, startY + 2 * cellSize + 20, 20, 20);
      ctx.shadowBlur = 0;

      // Text labels for Input/Output
      ctx.fillStyle = '#00f5ff';
      ctx.font = '10px Courier New';
      ctx.fillText("INPUT", startX - 25, startY + 2 * cellSize + 15);
      ctx.fillStyle = '#bd00ff';
      ctx.fillText("OUTPUT", startX + gridSize * cellSize + 1, startY + 2 * cellSize + 15);

      // Draw Grid
      for (let r = 0; r < gridSize; r++) {
        for (let c = 0; c < gridSize; c++) {
          const cell = grid[r][c];
          // Check if cell is in activePath
          const isActive = activePath.some(p => p.r === r && p.c === c);
          drawCell(r, c, cell.type, cell.rotation, isActive);
        }
      }
    }

    function endGame() {
      gameActive = false;
      overlay.style.display = 'flex';
      overlay.querySelector('h2').innerText = 'SYNC LOG EXPIRED';
      overlay.querySelector('p').innerHTML = `Matrix frequency collapsed.<br/>SYNC GAIN: <span style="color:#bd00ff; font-weight:bold;">${score} Hz</span>`;
      startBtn.innerText = 'RE-BOOT MATRIX';
    }

    function loop() {
      if (!gameActive) return;
      update();
      draw();
      requestAnimationFrame(loop);
    }
  </script>
</body>
</html>
