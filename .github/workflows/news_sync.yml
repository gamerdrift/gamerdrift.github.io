name: Daily News Synchronization

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run News Collector
        run: node scripts/news_collector.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/newsData.json
          if git diff --staged --quiet; then
            echo "No changes in news telemetry data. Skipping push."
          else
            git commit -m "chore(telemetry): update daily news feed"
            git push origin main
          fi
