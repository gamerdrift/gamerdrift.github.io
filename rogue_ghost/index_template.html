<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>RogueGhost</title>
		<style>
			/* Google Fonts integration */
			@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

			html, body, #canvas {
				margin: 0;
				padding: 0;
				border: 0;
				background-color: #030712;
				width: 100%;
				height: 100%;
			}

			body {
				color: #94a3b8;
				overflow: hidden;
				touch-action: none;
				font-family: 'Share Tech Mono', monospace;
			}

			#canvas {
				display: block;
				width: 100%;
				height: 100%;
			}

			#canvas:focus {
				outline: none;
			}

			#status {
				position: absolute;
				left: 0;
				right: 0;
				top: 0;
				bottom: 0;
				background-color: #020617 !important;
				display: flex;
				justify-content: center;
				align-items: center;
				z-index: 999;
				visibility: visible;
			}

			.scanline-overlay {
				position: absolute;
				inset: 0;
				pointer-events: none;
				background: linear-gradient(
					rgba(18, 16, 16, 0) 50%, 
					rgba(0, 0, 0, 0.25) 50%
				);
				background-size: 100% 4px;
				z-index: 10;
			}

			.loader-container {
				display: flex;
				flex-direction: row;
				align-items: center;
				gap: 3rem;
				max-width: 900px;
				width: 92%;
				padding: 2.5rem;
				background: rgba(15, 23, 42, 0.65);
				border: 1px solid rgba(0, 240, 255, 0.2);
				box-shadow: 0 0 50px rgba(0, 240, 255, 0.08), inset 0 0 25px rgba(0, 240, 255, 0.04);
				border-radius: 12px;
				backdrop-filter: blur(10px);
				position: relative;
				z-index: 20;
			}

			@media (max-width: 768px) {
				.loader-container {
					flex-direction: column;
					gap: 1.5rem;
					padding: 1.5rem;
					text-align: center;
				}
			}

			.left-panel {
				position: relative;
				width: 280px;
				height: 280px;
				flex-shrink: 0;
				display: flex;
				justify-content: center;
				align-items: center;
				border: 1px solid rgba(0, 240, 255, 0.15);
				background: rgba(2, 6, 23, 0.85);
				border-radius: 8px;
				overflow: hidden;
				box-shadow: 0 0 20px rgba(0, 240, 255, 0.05);
			}

			.right-panel {
				flex-grow: 1;
				display: flex;
				flex-direction: column;
				min-width: 0;
			}

			#custom-loader {
				display: flex;
				flex-direction: column;
				width: 100%;
			}

			.glow-header {
				font-family: 'Orbitron', sans-serif;
				font-size: 2.2rem;
				font-weight: 900;
				letter-spacing: 0.25em;
				color: #ffffff;
				text-shadow: 0 0 15px rgba(0, 240, 255, 0.8), 0 0 30px rgba(0, 240, 255, 0.2);
				margin-bottom: 0.2rem;
				text-transform: uppercase;
			}

			.glow-sub {
				font-family: 'Orbitron', sans-serif;
				font-size: 0.75rem;
				font-weight: 700;
				letter-spacing: 0.18em;
				color: #ff9f00;
				margin-bottom: 1.5rem;
				text-shadow: 0 0 8px rgba(255, 159, 0, 0.5);
				text-transform: uppercase;
			}

			.progress-info {
				display: flex;
				justify-content: space-between;
				font-size: 0.75rem;
				color: #64748b;
				margin-bottom: 0.5rem;
				letter-spacing: 0.05em;
			}

			.progress-container {
				width: 100%;
				height: 6px;
				background: #0f172a;
				border: 1px solid #1e293b;
				position: relative;
				border-radius: 4px;
				overflow: hidden;
				margin-bottom: 1.5rem;
			}

			#custom-progress-bar {
				width: 0%;
				height: 100%;
				background: linear-gradient(90deg, #00f0ff, #a855f7);
				box-shadow: 0 0 10px rgba(0, 240, 255, 0.8);
				transition: width 0.1s ease;
			}

			.terminal-logs {
				height: 110px;
				background: #020617;
				border: 1px solid #1e293b;
				border-radius: 6px;
				padding: 0.75rem;
				font-family: 'Share Tech Mono', monospace;
				font-size: 0.7rem;
				color: #38bdf8;
				overflow-y: hidden;
				line-height: 1.4;
				display: flex;
				flex-direction: column;
				justify-content: flex-end;
				text-align: left;
			}

			.terminal-line {
				margin: 2px 0;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.terminal-line.success {
				color: #4ade80;
			}

			.terminal-line.info {
				color: #00f0ff;
			}

			.terminal-line.warning {
				color: #fbbf24;
			}

			#status-notice {
				background-color: #3f1a24;
				border-radius: 0.5rem;
				border: 1px solid #9b3943;
				color: #fca5a5;
				font-family: 'Share Tech Mono', monospace;
				line-height: 1.4;
				padding: 1rem;
				text-align: center;
				display: none;
				width: 100%;
				box-sizing: border-box;
				font-size: 0.75rem;
			}

			#status-progress {
				display: none;
			}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
		<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<div class="scanline-overlay"></div>
			<div class="loader-container">
				<!-- Left Panel: Animated Radar Map -->
				<div class="left-panel">
					<canvas id="tactical-canvas" style="width: 280px; height: 280px; display: block;"></canvas>
				</div>
				<!-- Right Panel: Mission Specs & Console Logs -->
				<div class="right-panel">
					<div id="custom-loader">
						<div class="glow-header">ROGUE GHOST</div>
						<div class="glow-sub">TACTICAL INFILTRATION GRID // GAMERDRIFT.COM</div>
						
						<div class="progress-info">
							<span id="custom-status-text">CONNECTING TO SATELLITE...</span>
							<span id="custom-percentage-text">0%</span>
						</div>
						<div class="progress-container">
							<div id="custom-progress-bar"></div>
						</div>
						
						<div class="terminal-logs" id="terminal-logs">
							<!-- Custom loading logs will be dynamically inserted here -->
						</div>
					</div>
					<div id="status-notice"></div>
					<div id="status-progress"></div>
				</div>
			</div>
		</div>

		<script src="index.js"></script>
		<script>
// {{GODOT_CONFIG}}
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		
		const customLoader = document.getElementById('custom-loader');
		if (mode === 'notice') {
			statusNotice.style.display = 'block';
			if (customLoader) customLoader.style.display = 'none';
		} else {
			statusNotice.style.display = 'none';
			if (customLoader) customLoader.style.display = 'flex';
		}
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	// ─── CANVAST TACTICAL RADAR ANIMATION ───
	const radarCanvas = document.getElementById('tactical-canvas');
	const ctx = radarCanvas.getContext('2d');
	const dpr = window.devicePixelRatio || 1;
	radarCanvas.width = 280 * dpr;
	radarCanvas.height = 280 * dpr;
	ctx.scale(dpr, dpr);

	const cx = 140;
	const cy = 140;
	let angle = 0;

	const targets = [
		{ name: 'TG-01: WHITE_REAPER', x: 195, y: 70, label: 'SNIPER BOSS' },
		{ name: 'OBJ-02: CONVOY_ALPHA', x: 80, y: 180, label: 'WRECKAGE' },
		{ name: 'FR-01: RANGER_ALPHA', x: 105, y: 120, label: 'SURVIVOR' },
		{ name: 'EXT-01: EXTRACTION', x: 210, y: 210, label: 'HELIPAD' }
	];

	const contours = [
		{ x: 185, y: 85, rMax: 75, count: 5, amp: 7, phase: 0.3 },
		{ x: 90, y: 185, rMax: 60, count: 4, amp: 5, phase: 1.2 }
	];

	function drawRadar() {
		ctx.fillStyle = '#020617';
		ctx.fillRect(0, 0, 280, 280);

		ctx.strokeStyle = 'rgba(0, 240, 255, 0.04)';
		ctx.lineWidth = 1;
		for (let x = 20; x < 280; x += 40) {
			ctx.beginPath();
			ctx.moveTo(x, 0);
			ctx.lineTo(x, 280);
			ctx.stroke();
		}
		for (let y = 20; y < 280; y += 40) {
			ctx.beginPath();
			ctx.moveTo(0, y);
			ctx.lineTo(280, y);
			ctx.stroke();
		}

		ctx.lineWidth = 1;
		contours.forEach(c => {
			for (let r = 15; r <= c.rMax; r += 15) {
				ctx.strokeStyle = `rgba(0, 240, 255, ${0.03 + (1 - r/c.rMax) * 0.08})`;
				ctx.beginPath();
				for (let a = 0; a < Math.PI * 2; a += 0.08) {
					const wave = Math.sin(a * c.count + c.phase) * c.amp;
					const currR = r + wave;
					const px = c.x + Math.cos(a) * currR;
					const py = c.y + Math.sin(a) * currR;
					if (a === 0) ctx.moveTo(px, py);
					else ctx.lineTo(px, py);
				}
				ctx.closePath();
				ctx.stroke();
			}
		});

		ctx.strokeStyle = 'rgba(0, 240, 255, 0.07)';
		ctx.beginPath();
		ctx.arc(cx, cy, 125, 0, Math.PI * 2);
		ctx.stroke();
		ctx.beginPath();
		ctx.arc(cx, cy, 80, 0, Math.PI * 2);
		ctx.stroke();
		ctx.beginPath();
		ctx.arc(cx, cy, 40, 0, Math.PI * 2);
		ctx.stroke();

		ctx.strokeStyle = 'rgba(0, 240, 255, 0.12)';
		ctx.beginPath();
		ctx.moveTo(cx - 130, cy);
		ctx.lineTo(cx + 130, cy);
		ctx.moveTo(cx, cy - 130);
		ctx.lineTo(cx, cy + 130);
		ctx.stroke();

		angle = (angle + 0.012) % (Math.PI * 2);

		ctx.beginPath();
		ctx.moveTo(cx, cy);
		ctx.arc(cx, cy, 125, angle - 0.5, angle);
		ctx.lineTo(cx, cy);
		const sweepGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 125);
		sweepGrad.addColorStop(0, 'rgba(0, 240, 255, 0.15)');
		sweepGrad.addColorStop(1, 'rgba(0, 240, 255, 0.01)');
		ctx.fillStyle = sweepGrad;
		ctx.fill();

		ctx.beginPath();
		ctx.moveTo(cx, cy);
		ctx.lineTo(cx + Math.cos(angle) * 125, cy + Math.sin(angle) * 125);
		ctx.strokeStyle = 'rgba(0, 240, 255, 0.4)';
		ctx.lineWidth = 1.5;
		ctx.stroke();

		targets.forEach(t => {
			const dx = t.x - cx;
			const dy = t.y - cy;
			let tAngle = Math.atan2(dy, dx);
			if (tAngle < 0) tAngle += Math.PI * 2;

			let diff = (angle - tAngle) % (Math.PI * 2);
			if (diff < 0) diff += Math.PI * 2;

			let intensity = 0;
			if (diff < 1.0) {
				intensity = 1.0 - diff / 1.0;
			}

			const isBlinking = Date.now() % 1000 < 500;

			ctx.beginPath();
			ctx.arc(t.x, t.y, 3, 0, Math.PI * 2);
			ctx.fillStyle = t.name.includes('WHITE_REAPER')
				? `rgba(239, 68, 68, ${0.3 + intensity * 0.7})`
				: `rgba(0, 240, 255, ${0.3 + intensity * 0.7})`;
			ctx.fill();

			if (intensity > 0.05) {
				ctx.beginPath();
				ctx.arc(t.x, t.y, 4 + (1 - intensity) * 12, 0, Math.PI * 2);
				ctx.strokeStyle = t.name.includes('WHITE_REAPER')
					? `rgba(239, 68, 68, ${intensity * 0.35})`
					: `rgba(0, 240, 255, ${intensity * 0.35})`;
				ctx.lineWidth = 1;
				ctx.stroke();

				const boxSize = 6 + (1 - intensity) * 3;
				ctx.strokeStyle = t.name.includes('WHITE_REAPER')
					? `rgba(239, 68, 68, ${intensity * 0.5})`
					: `rgba(0, 240, 255, ${intensity * 0.5})`;
				ctx.strokeRect(t.x - boxSize, t.y - boxSize, boxSize * 2, boxSize * 2);

				ctx.fillStyle = t.name.includes('WHITE_REAPER')
					? `rgba(239, 68, 68, ${0.4 + intensity * 0.6})`
					: `rgba(56, 189, 248, ${0.4 + intensity * 0.6})`;
				ctx.font = '6px "Share Tech Mono", monospace';
				ctx.fillText(t.name, t.x + boxSize + 3, t.y - 2);
				ctx.fillText(t.label, t.x + boxSize + 3, t.y + 4);
			}
		});

		ctx.fillStyle = 'rgba(0, 240, 255, 0.4)';
		ctx.font = '7px "Share Tech Mono", monospace';
		ctx.fillText('N 000°', cx - 12, 18);
		ctx.fillText('S 180°', cx - 12, 270);
		ctx.fillText('W 270°', 10, cy + 3);
		ctx.fillText('E 090°', 245, cy + 3);

		const tickLat = (78.1342 + Math.sin(Date.now() / 1200) * 0.0003).toFixed(4);
		const tickLon = (15.3881 + Math.cos(Date.now() / 1200) * 0.0003).toFixed(4);
		ctx.fillStyle = 'rgba(148, 163, 184, 0.5)';
		ctx.fillText(`GPS.LAT: ${tickLat}° N`, 15, 25);
		ctx.fillText(`GPS.LON: ${tickLon}° E`, 15, 35);
		ctx.fillText(`ALTITUDE: 142.4 M`, 15, 45);

		ctx.fillStyle = 'rgba(34, 197, 94, 0.6)';
		ctx.fillText('SYS.LINK: OK', 200, 25);
		if (Date.now() % 1000 < 500) {
			ctx.fillStyle = 'rgba(239, 68, 68, 0.7)';
			ctx.fillText('• RADAR SCAN', 200, 35);
		}

		requestAnimationFrame(drawRadar);
	}
	requestAnimationFrame(drawRadar);

	// ─── TERMINAL LOG SYSTEM ───
	const logsContainer = document.getElementById('terminal-logs');

	function addTerminalLog(text, type = 'info') {
		const logEl = document.createElement('div');
		logEl.className = 'terminal-line ' + type;
		
		const now = new Date();
		const timeStr = '[' + 
			String(now.getHours()).padStart(2, '0') + ':' + 
			String(now.getMinutes()).padStart(2, '0') + ':' + 
			String(now.getSeconds()).padStart(2, '0') + '.' + 
			String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0') + 
		']';
		
		logEl.textContent = timeStr + ' ' + text;
		logsContainer.appendChild(logEl);
		
		while (logsContainer.children.length > 5) {
			logsContainer.removeChild(logsContainer.firstChild);
		}
	}

	addTerminalLog('ESTABLISHING SECURE CONNECTION TO SATELLITE CORONA-9...', 'info');
	setTimeout(() => addTerminalLog('HANDSHAKE COMPLETED. ENCRYPTED COMMS TUNNEL STABLE.', 'success'), 350);
	setTimeout(() => addTerminalLog('GAMERDRIFT NETWORK INTEGRITY CHECK: PASS', 'success'), 700);
	setTimeout(() => addTerminalLog('DISPATCHING TACTICAL GRID TO SECTOR SW-07...', 'info'), 1050);

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');

		let milestone15 = false;
		let milestone40 = false;
		let milestone65 = false;
		let milestone85 = false;
		let milestone100 = false;

		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					const pct = (current / total) * 100;
					
					const bar = document.getElementById('custom-progress-bar');
					if (bar) bar.style.width = pct + '%';
					
					const pctText = document.getElementById('custom-percentage-text');
					if (pctText) pctText.textContent = Math.floor(pct) + '%';
					
					const statusText = document.getElementById('custom-status-text');
					if (statusText) statusText.textContent = 'SYS.LOAD: RECONNAISSANCE MAP "SNOWBLOW"';

					if (pct >= 15 && !milestone15) {
						milestone15 = true;
						addTerminalLog('COMPILING SPATIAL SHADERS: FOG_BLIZZARD.SHD', 'info');
					}
					if (pct >= 40 && !milestone40) {
						milestone40 = true;
						addTerminalLog('LOADING TACTICAL OPERATIVE MODEL & COLLIDERS', 'info');
					}
					if (pct >= 65 && !milestone65) {
						milestone65 = true;
						addTerminalLog('RESOLVING ENVIRONMENT COORDINATES: OUTPOST_SNOWBLOW.MAP', 'info');
					}
					if (pct >= 85 && !milestone85) {
						milestone85 = true;
						addTerminalLog('INITIALIZING OP-FOR RECON AI: "THE WHITE REAPER"', 'warning');
					}
					if (pct >= 99 && !milestone100) {
						milestone100 = true;
						addTerminalLog('SYNCHRONIZATION COMPLETE. ENGAGING DISPATCH VECTOR.', 'success');
					}
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
